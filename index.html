<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <!--  google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Quizly | Quiz App</title>
  </head>
  <body>
    <div class="quiz-app">
      <div class="quiz-info">
        <h3 class="category">General Knowledge</h3>
        <div class="question-counter">
          Question 
          <span class="current"></span>
          of
          <span class="length"></span>
        </div>
        <div class="progress-circles"></div>
        <div class="timer">00:00</div>
        <div class="progress-bar"><div class="bar"></div></div>
      </div>
      <div class="question">
      </div>
      <div class="answers" >
        <div class="answer-1"><span>A</span> </div>
        <div class="answer-2"><span>B</span> </div>
        <div class="answer-3"><span>C</span> </div>
        <div class="answer-4"><span>D</span> </div>
      </div>
      <button>Submit Answer</button>
    </div>
    <footer>2026, Quzily BY <span>Abdul_Rahman_Sayed</span></footer>
  </body>
  <script src="function.js"></script>
  <script src="logic.js"></script>
</html>
